<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운동 기록 사이트</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* 로그인 페이지 */
        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .login-card {
            background: white;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 100%;
        }
        
        .login-card h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .form-group input:focus {
            border-color: #667eea;
            outline: none;
        }
        
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .btn-login:hover {
            background-color: #764ba2;
        }
        
        .error-msg {
            color: #e74c3c;
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
        }
        
        .code-info {
            background: #ecf0f1;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 12px;
            color: #555;
        }
        
        .code-info p {
            margin-bottom: 5px;
        }

        /* 운동 앱 스타일 */
        .setup-page { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .setup-card { background: white; padding: 40px; border: 1px solid #ddd; border-radius: 5px; max-width: 400px; width: 100%; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .setup-card h1 { font-size: 24px; margin-bottom: 20px; text-align: center; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        .day-options { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-top: 10px; }
        .day-options label { display: flex; align-items: center; margin: 0; font-size: 14px; }
        .day-options input { width: auto; margin-right: 5px; }
        .btn-primary { width: 100%; padding: 12px; background-color: #0066cc; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-primary:hover { background-color: #0052a3; }
        .main-page { background: white; padding: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #0066cc; padding-bottom: 15px; }
        .header h2 { margin: 0; }
        .btn-reset { padding: 8px 16px; background-color: #ff6b6b; color: white; border: none; border-radius: 5px; cursor: pointer; margin-left: 10px; }
        .btn-logout-app { padding: 8px 16px; background-color: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .nav-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-tab { padding: 10px 20px; background-color: #f0f0f0; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .nav-tab.active { background-color: #0066cc; color: white; }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-month { padding: 8px 16px; background-color: #0066cc; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .calendar-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #ddd; border-radius: 5px; background-color: white; cursor: pointer; font-weight: bold; padding: 5px; font-size: 12px; gap: 3px; }
        .calendar-day:hover { background-color: #f0f0f0; }
        .calendar-day.rest { background-color: #ffcccc; }
        .calendar-day.today { background-color: #e6f0ff; border: 2px solid #0066cc; }
        .calendar-day.completed { background-color: #e6ffe6; }
        .calendar-day-number { font-weight: bold; font-size: 14px; }
        .calendar-day-workout { font-size: 10px; color: #0066cc; font-weight: normal; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal.show { display: flex; }
        .modal-content { background-color: white; padding: 20px; border-radius: 10px; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #0066cc; padding-bottom: 10px; }
        .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; }
        .exercise-group { margin-bottom: 25px; }
        .exercise-group h3 { color: #0066cc; margin-bottom: 15px; }
        .exercise-item { padding: 15px; background-color: #f9f9f9; border-radius: 5px; border-left: 4px solid #0066cc; margin-bottom: 10px; }
        .exercise-checkbox { margin-right: 10px; width: auto; }
        .exercise-name { font-weight: bold; margin-bottom: 10px; margin-top: 10px; }
        .video-link { color: #0066cc; text-decoration: none; margin-left: 10px; font-size: 12px; }
        .video-link:hover { text-decoration: underline; }
        .set-container { margin: 12px 0; padding: 10px; background-color: white; border-radius: 4px; }
        .set-item { margin-bottom: 12px; padding: 10px; background-color: #f0f0f0; border-radius: 4px; }
        .set-item-title { font-weight: bold; margin-bottom: 5px; }
        .set-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .set-inputs input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
        .btn-add-set { padding: 6px 12px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; margin-right: 5px; }
        .btn-add-set:hover { background-color: #218838; }
        .btn-remove-set { padding: 6px 12px; background-color: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .btn-remove-set:hover { background-color: #c82333; }
        .btn-set-control { margin-top: 10px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-secondary { flex: 1; padding: 10px; background-color: #ccc; border: none; border-radius: 5px; cursor: pointer; }
        .btn-save { flex: 1; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .records-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .record-card { background-color: #f9f9f9; padding: 15px; border-radius: 5px; border: 1px solid #ddd; }
        .record-card h4 { color: #0066cc; margin-bottom: 10px; }
        .record-card p { margin: 5px 0; font-size: 14px; }
        
        .expiry-info {
            background-color: #fff3cd;
            border: 1px solid #ffc107;
            color: #856404;
            padding: 10px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <!-- 로그인 화면 -->
    <div id="loginPage" class="login-page">
        <div class="login-card">
            <h1>🏋️ 운동 기록 사이트</h1>
            
            <div class="form-group">
                <label for="accessCode">접근 코드 입력:</label>
                <input type="text" id="accessCode" placeholder="코드를 입력하세요">
            </div>
            
            <button class="btn-login" onclick="checkCode()">접속</button>
            
            <div id="errorMsg" class="error-msg"></div>
            
            <div class="code-info">
                <p><strong>📝 코드 종류:</strong></p>
                <p>🔹 관리자: <strong>admin</strong></p>
                <p style="font-size: 11px; color: #999;">코드는 관리자 페이지에서 생성하세요</p>
            </div>
        </div>
    </div>

    <!-- 운동 앱 -->
    <div id="appContainer" style="display: none;">
        <div class="container">
            <div class="expiry-info">
                <span id="expiryInfo">⏰ 남은 시간: 계산 중...</span>
                <button class="btn-logout-app" onclick="logoutApp()" style="float: right;">로그아웃</button>
                <div style="clear: both;"></div>
            </div>

            <div id="setupPage" class="setup-page" style="display: none; min-height: auto;">
                <div class="setup-card">
                    <h1>운동 기록 사이트</h1>
                    <div class="form-group">
                        <label for="userName">이름:</label>
                        <input type="text" id="userName" placeholder="이름을 입력하세요">
                    </div>
                    <div class="form-group">
                        <label for="splitSelect">분할 선택:</label>
                        <select id="splitSelect">
                            <option value="">선택하세요</option>
                            <option value="2">2분할 (상체, 하체)</option>
                            <option value="3">3분할 (가슴+어깨+삼두, 등+이두, 하체)</option>
                            <option value="4">4분할 (가슴, 등, 어깨+팔, 하체)</option>
                            <option value="5">5분할 (가슴, 등, 어깨, 하체, 팔)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>운동할 요일:</label>
                        <div class="day-options">
                            <label><input type="checkbox" name="workoutDay" value="1"> 월</label>
                            <label><input type="checkbox" name="workoutDay" value="2"> 화</label>
                            <label><input type="checkbox" name="workoutDay" value="3"> 수</label>
                            <label><input type="checkbox" name="workoutDay" value="4"> 목</label>
                            <label><input type="checkbox" name="workoutDay" value="5"> 금</label>
                            <label><input type="checkbox" name="workoutDay" value="6"> 토</label>
                            <label><input type="checkbox" name="workoutDay" value="7"> 일</label>
                        </div>
                    </div>
                    <button class="btn-primary" type="button" onclick="startSetup()">시작하기</button>
                </div>
            </div>

            <div id="mainPage" class="main-page" style="display: none;">
                <div class="header">
                    <div>
                        <h2 id="displayName"></h2>
                        <p id="displaySplit"></p>
                    </div>
                    <button class="btn-reset" type="button" onclick="resetApp()">재설정</button>
                </div>
                <div class="nav-tabs">
                    <button class="nav-tab active" type="button" onclick="switchTab(0)">달력</button>
                    <button class="nav-tab" type="button" onclick="switchTab(1)">기록 보기</button>
                </div>
                <div id="scheduleTab">
                    <div class="calendar-header">
                        <button class="btn-month" type="button" onclick="previousMonth()">◀ 이전</button>
                        <h3 id="currentMonth"></h3>
                        <button class="btn-month" type="button" onclick="nextMonth()">다음 ▶</button>
                    </div>
                    <div id="calendarGrid" class="calendar-grid"></div>
                </div>
                <div id="recordsTab" style="display: none;">
                    <div id="recordsList" class="records-list"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="workoutModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <button class="close-btn" type="button" onclick="closeModal()">&times;</button>
            </div>
            <div id="exerciseList"></div>
            <div class="modal-buttons">
                <button class="btn-secondary" type="button" onclick="closeModal()">취소</button>
                <button class="btn-save" type="button" onclick="saveWorkout()">저장하기</button>
            </div>
        </div>
    </div>

    <script>
        var splitPrograms = {
            2: [
                { name: '상체', muscles: ['가슴','등','어깨','팔'] },
                { name: '하체', muscles: ['하체'] }
            ],
            3: [
                { name: '가슴+어깨+삼두', muscles: ['가슴','어깨','팔'] },
                { name: '등+이두', muscles: ['등','팔'] },
                { name: '하체', muscles: ['하체'] }
            ],
            4: [
                { name: '가슴', muscles: ['가슴'] },
                { name: '등', muscles: ['등'] },
                { name: '어깨+팔', muscles: ['어깨','팔'] },
                { name: '하체', muscles: ['하체'] }
            ],
            5: [
                { name: '가슴', muscles: ['가슴'] },
                { name: '등', muscles: ['등'] },
                { name: '어깨', muscles: ['어깨'] },
                { name: '하체', muscles: ['하체'] },
                { name: '팔', muscles: ['팔'] }
            ]
        };

        var exerciseDatabase = {
            가슴: [
                { name: '벤치프레스', url: 'https://www.youtube.com/results?search_query=벤치프레스' },
                { name: '인클라인프레스', url: 'https://www.youtube.com/results?search_query=인클라인프레스' },
                { name: '덤벨프레스', url: 'https://www.youtube.com/results?search_query=덤벨프레스' },
                { name: '푸시업', url: 'https://www.youtube.com/results?search_query=푸시업' },
                { name: '플라이머신', url: 'https://www.youtube.com/results?search_query=플라이머신' },
                { name: '케이블플라이', url: 'https://www.youtube.com/results?search_query=케이블플라이' }
            ],
            등: [
                { name: '풀업', url: 'https://www.youtube.com/results?search_query=풀업' },
                { name: '랫풀다운', url: 'https://www.youtube.com/results?search_query=랫풀다운' },
                { name: '바벨로우', url: 'https://www.youtube.com/results?search_query=바벨로우' },
                { name: '덤벨로우', url: 'https://www.youtube.com/results?search_query=덤벨로우' },
                { name: '씨티드로우', url: 'https://www.youtube.com/results?search_query=씨티드로우' },
                { name: '페이스풀', url: 'https://www.youtube.com/results?search_query=페이스풀' }
            ],
            어깨: [
                { name: '숄더프레스', url: 'https://www.youtube.com/results?search_query=숄더프레스' },
                { name: '사이드레이즈', url: 'https://www.youtube.com/results?search_query=사이드레이즈' },
                { name: '리버스플라이', url: 'https://www.youtube.com/results?search_query=리버스플라이' },
                { name: '어깨들기', url: 'https://www.youtube.com/results?search_query=어깨들기' },
                { name: '인클라인벤치레이즈', url: 'https://www.youtube.com/results?search_query=인클라인벤치레이즈' }
            ],
            팔: {
                삼두: [
                    { name: '트라이셉스딥스', url: 'https://www.youtube.com/results?search_query=딥스' },
                    { name: '오버헤드익스텐션', url: 'https://www.youtube.com/results?search_query=오버헤드익스텐션' },
                    { name: '트라이셉스로프', url: 'https://www.youtube.com/results?search_query=트라이셉스로프' },
                    { name: 'V바풀다운', url: 'https://www.youtube.com/results?search_query=V바풀다운' },
                    { name: '스컬크러셔', url: 'https://www.youtube.com/results?search_query=스컬크러셔' }
                ],
                이두: [
                    { name: '바벨컬', url: 'https://www.youtube.com/results?search_query=바벨컬' },
                    { name: '덤벨컬', url: 'https://www.youtube.com/results?search_query=덤벨컬' },
                    { name: '핸머컬', url: 'https://www.youtube.com/results?search_query=핸머컬' },
                    { name: '케이블컬', url: 'https://www.youtube.com/results?search_query=케이블컬' },
                    { name: '프리처컬', url: 'https://www.youtube.com/results?search_query=프리처컬' }
                ]
            },
            하체: [
                { name: '백스쿼트', url: 'https://www.youtube.com/results?search_query=백스쿼트' },
                { name: '레그프레스', url: 'https://www.youtube.com/results?search_query=레그프레스' },
                { name: '레그익스텐션', url: 'https://www.youtube.com/results?search_query=레그익스텐션' },
                { name: '레그컬', url: 'https://www.youtube.com/results?search_query=레그컬' },
                { name: '루마니안데드리프트', url: 'https://www.youtube.com/results?search_query=루마니안데드리프트' },
                { name: '카프레이즈', url: 'https://www.youtube.com/results?search_query=카프레이즈' },
                { name: '스플릿스쿠트', url: 'https://www.youtube.com/results?search_query=스플릿스쿠트' }
            ]
        };

        var appState = { name: '', split: null, currentDate: new Date(), selectedDate: null, records: [], selectedDays: [] };
        var currentProgram = {};
        var setCounters = {};

        // ===== 로그인 함수 =====
        function checkCode() {
            var code = document.getElementById('accessCode').value.trim();
            var errorMsg = document.getElementById('errorMsg');
            
            if (!code) {
                errorMsg.textContent = '⚠️ 코드를 입력해주세요';
                return;
            }

            if (code === 'admin') {
                window.location.href = 'admin/';
                return;
            }
            
            // 관리자 페이지에서 생성한 코드 확인
            var adminCodes = JSON.parse(localStorage.getItem('adminCodes') || '[]');
            var codeFound = false;
            var codeData = null;

            for (var i = 0; i < adminCodes.length; i++) {
                if (adminCodes[i].code === code) {
                    codeFound = true;
                    codeData = adminCodes[i];
                    break;
                }
            }

            if (!codeFound) {
                errorMsg.textContent = '❌ 유효하지 않은 코드입니다';
                return;
            }

            if (!codeData.active) {
                errorMsg.textContent = '❌ 비활성화된 코드입니다';
                return;
            }
            
            var now = new Date().getTime();
            var duration = codeData.type === 'day' ? 24 * 60 * 60 * 1000 : 
                          codeData.type === 'week' ? 7 * 24 * 60 * 60 * 1000 : 
                          30 * 24 * 60 * 60 * 1000;
            var expiryTime = now + duration;
            
            var loginData = {
                code: code,
                loginTime: now,
                expiryTime: expiryTime
            };
            
            localStorage.setItem('loginData', JSON.stringify(loginData));
            errorMsg.textContent = '';
            showApp();
        }

        function logoutApp() {
            if (confirm('로그아웃 하시겠습니까?')) {
                localStorage.removeItem('loginData');
                document.getElementById('loginPage').style.display = 'flex';
                document.getElementById('appContainer').style.display = 'none';
                document.getElementById('accessCode').value = '';
            }
        }

        function showApp() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            updateExpiryInfo();
            setInterval(function() {
                checkExpiry();
                updateExpiryInfo();
            }, 60000);
            
            var savedState = localStorage.getItem('appState');
            if (savedState) {
                var saved = JSON.parse(savedState);
                appState.name = saved.name;
                appState.split = saved.split;
                appState.selectedDays = saved.selectedDays;
                appState.records = localStorage.getItem('workoutRecords') ? JSON.parse(localStorage.getItem('workoutRecords')) : [];
                currentProgram = makeProgram(appState.split, appState.selectedDays);
                showMainPage();
            } else {
                document.getElementById('setupPage').style.display = 'flex';
            }
        }

        function updateExpiryInfo() {
            var loginData = localStorage.getItem('loginData');
            if (!loginData) return;
            
            var data = JSON.parse(loginData);
            var now = new Date().getTime();
            var remainingTime = data.expiryTime - now;
            
            if (remainingTime > 0) {
                var totalDays = Math.floor(remainingTime / (1000 * 60 * 60 * 24));
                var totalHours = Math.floor(remainingTime / (1000 * 60 * 60));
                var totalMinutes = Math.floor(remainingTime / (1000 * 60));
                
                var weeks = Math.floor(totalDays / 7);
                var days = totalDays % 7;
                var hours = Math.floor((remainingTime % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                var minutes = Math.floor((remainingTime % (1000 * 60 * 60)) / (1000 * 60));
                
                var timeText = '';
                
                if (weeks > 0) {
                    timeText = weeks + '주 ' + days + '일 ' + hours + '시간 ' + minutes + '분';
                } else if (totalDays > 0) {
                    timeText = days + '일 ' + hours + '시간 ' + minutes + '분';
                } else if (totalHours > 0) {
                    timeText = totalHours + '시간 ' + minutes + '분';
                } else {
                    timeText = totalMinutes + '분';
                }
                
                var infoDiv = document.getElementById('expiryInfo');
                if (infoDiv) {
                    infoDiv.textContent = '⏰ 남은 시간: ' + timeText;
                }
            }
        }

        function checkExpiry() {
            var loginData = localStorage.getItem('loginData');
            
            if (loginData) {
                var data = JSON.parse(loginData);
                var now = new Date().getTime();
                
                if (now >= data.expiryTime) {
                    alert('⏰ 접근 코드가 만료되었습니다. 다시 로그인해주세요.');
                    localStorage.removeItem('loginData');
                    document.getElementById('loginPage').style.display = 'flex';
                    document.getElementById('appContainer').style.display = 'none';
                }
            }
        }

        // ===== 운동 앱 함수 =====
        function startSetup() {
            var name = document.getElementById('userName').value.trim();
            var split = parseInt(document.getElementById('splitSelect').value);
            var checkboxes = document.querySelectorAll('input[name="workoutDay"]:checked');
            var selectedDays = [];
            for (var i = 0; i < checkboxes.length; i++) {
                selectedDays.push(parseInt(checkboxes[i].value));
            }

            if (!name) { alert('이름을 입력해주세요'); return; }
            if (!split) { alert('분할을 선택해주세요'); return; }
            if (selectedDays.length === 0) { alert('운동할 요일을 선택해주세요'); return; }
            if (selectedDays.length !== split) { alert(split + '분할은 ' + split + '개의 요일을 선택해야 합니다'); return; }

            appState.name = name;
            appState.split = split;
            appState.selectedDays = selectedDays;
            appState.records = localStorage.getItem('workoutRecords') ? JSON.parse(localStorage.getItem('workoutRecords')) : [];

            currentProgram = makeProgram(split, selectedDays);
            
            localStorage.setItem('appState', JSON.stringify({
                name: appState.name,
                split: appState.split,
                selectedDays: appState.selectedDays
            }));

            showMainPage();
        }

        function makeProgram(split, selectedDays) {
            var prog = {};
            var workouts = splitPrograms[split];
            var sorted = selectedDays.slice();
            sorted.sort(function(a, b) { return a - b; });
            
            for (var i = 0; i < sorted.length && i < workouts.length; i++) {
                prog[sorted[i]] = workouts[i];
            }
            return prog;
        }

        function showMainPage() {
            document.getElementById('setupPage').style.display = 'none';
            document.getElementById('mainPage').style.display = 'block';
            document.getElementById('displayName').textContent = appState.name;
            document.getElementById('displaySplit').textContent = appState.split + '분할 프로그램';
            renderCalendar();
        }

        function renderCalendar() {
            var year = appState.currentDate.getFullYear();
            var month = appState.currentDate.getMonth();
            var monthNames = ['1월', '2월', '3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월'];
            
            document.getElementById('currentMonth').textContent = year + '년 ' + monthNames[month];

            var calendarGrid = document.getElementById('calendarGrid');
            calendarGrid.innerHTML = '';

            var firstDay = new Date(year, month, 1).getDay();
            var daysInMonth = new Date(year, month + 1, 0).getDate();
            var dayCount = 1;

            for (var i = 0; i < 42; i++) {
                var cell = document.createElement('div');
                cell.className = 'calendar-day';

                if (i < firstDay) {
                    cell.style.color = '#ccc';
                    cell.textContent = new Date(year, month, 0).getDate() - firstDay + i + 1;
                } else if (dayCount <= daysInMonth) {
                    var cellDate = new Date(year, month, dayCount);
                    var dateStr = cellDate.toLocaleDateString('ko-KR');
                    var jsDay = cellDate.getDay();
                    var dayOfWeek = jsDay === 0 ? 7 : jsDay;
                    
                    var isWorkout = appState.selectedDays.indexOf(dayOfWeek) !== -1;
                    var workout = isWorkout ? currentProgram[dayOfWeek] : null;
                    var name = workout ? workout.name : '휴식';

                    var numDiv = document.createElement('div');
                    numDiv.className = 'calendar-day-number';
                    numDiv.textContent = dayCount;
                    
                    var nameDiv = document.createElement('div');
                    nameDiv.className = 'calendar-day-workout';
                    nameDiv.textContent = name;

                    cell.appendChild(numDiv);
                    cell.appendChild(nameDiv);

                    if (cellDate.toDateString() === new Date().toDateString()) {
                        cell.classList.add('today');
                    }
                    if (!isWorkout) {
                        cell.classList.add('rest');
                    }

                    var hasRecord = false;
                    for (var j = 0; j < appState.records.length; j++) {
                        if (appState.records[j].date === dateStr) {
                            hasRecord = true;
                            cell.classList.add('completed');
                            break;
                        }
                    }

                    var tempDate = new Date(cellDate);
                    cell.onclick = (function(d) {
                        return function() { onCalendarClick(d); };
                    })(tempDate);

                    dayCount++;
                } else {
                    cell.style.color = '#ccc';
                    cell.textContent = dayCount - daysInMonth;
                }

                calendarGrid.appendChild(cell);
            }
        }

        function previousMonth() { appState.currentDate.setMonth(appState.currentDate.getMonth() - 1); renderCalendar(); }
        function nextMonth() { appState.currentDate.setMonth(appState.currentDate.getMonth() + 1); renderCalendar(); }

        function onCalendarClick(cellDate) {
            var jsDay = cellDate.getDay();
            var dayOfWeek = jsDay === 0 ? 7 : jsDay;
            
            if (appState.selectedDays.indexOf(dayOfWeek) === -1) {
                alert('휴식일입니다');
                return;
            }

            appState.selectedDate = cellDate;
            var workout = currentProgram[dayOfWeek];

            if (!workout) {
                alert('운동 정보가 없습니다');
                return;
            }

            var dateStr = cellDate.toLocaleDateString('ko-KR');
            var dayNames = ['일', '월', '화', '수', '목', '금', '토'];
            document.getElementById('modalTitle').textContent = dateStr + ' (' + dayNames[cellDate.getDay()] + '요일) - ' + workout.name;

            var exerciseList = document.getElementById('exerciseList');
            exerciseList.innerHTML = '';

            var existingRecord = null;
            for (var i = 0; i < appState.records.length; i++) {
                if (appState.records[i].date === dateStr) {
                    existingRecord = appState.records[i];
                    break;
                }
            }

            setCounters = {};

            for (var m = 0; m < workout.muscles.length; m++) {
                var muscle = workout.muscles[m];
                var group = document.createElement('div');
                group.className = 'exercise-group';
                
                var h3 = document.createElement('h3');
                h3.textContent = muscle;
                group.appendChild(h3);

                var exercises = [];
                if (muscle === '팔') {
                    exercises = (exerciseDatabase.팔.삼두 || []).concat(exerciseDatabase.팔.이두 || []);
                } else {
                    exercises = exerciseDatabase[muscle] || [];
                }

                for (var e = 0; e < exercises.length; e++) {
                    var ex = exercises[e];
                    var exName = ex.name;
                    var exUrl = ex.url;
                    
                    var exRecord = null;
                    if (existingRecord) {
                        for (var r = 0; r < existingRecord.exercises.length; r++) {
                            if (existingRecord.exercises[r].name === exName) {
                                exRecord = existingRecord.exercises[r];
                                break;
                            }
                        }
                    }

                    var item = document.createElement('div');
                    item.className = 'exercise-item';

                    var checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.className = 'exercise-checkbox';
                    checkbox.setAttribute('data-exercise', exName);
                    checkbox.setAttribute('data-unique-id', muscle + '-' + e);
                    if (exRecord) checkbox.checked = true;

                    var nameSpan = document.createElement('span');
                    nameSpan.className = 'exercise-name';
                    nameSpan.textContent = exName;
                    if (exUrl) {
                        var link = document.createElement('a');
                        link.href = exUrl;
                        link.target = '_blank';
                        link.className = 'video-link';
                        link.textContent = '📹 영상보기';
                        nameSpan.appendChild(document.createTextNode(' '));
                        nameSpan.appendChild(link);
                    }

                    var setContainer = document.createElement('div');
                    setContainer.className = 'set-container';
                    setContainer.id = 'set-container-' + muscle + '-' + e;

                    var setData = exRecord && exRecord.setDetails ? exRecord.setDetails : [];
                    var uniqueId = muscle + '-' + e;
                    setCounters[uniqueId] = setData.length > 0 ? setData.length : 1;

                    for (var s = 0; s < setCounters[uniqueId]; s++) {
                        var setDiv = createSetDiv(s, setData, muscle + '-' + e);
                        setContainer.appendChild(setDiv);
                    }

                    var btnDiv = document.createElement('div');
                    btnDiv.className = 'btn-set-control';
                    
                    var addBtn = document.createElement('button');
                    addBtn.className = 'btn-add-set';
                    addBtn.type = 'button';
                    addBtn.textContent = '+ 세트 추가';
                    addBtn.onclick = (function(uid) {
                        return function() { addSet(uid); };
                    })(muscle + '-' + e);

                    var removeBtn = document.createElement('button');
                    removeBtn.className = 'btn-remove-set';
                    removeBtn.type = 'button';
                    removeBtn.textContent = '- 세트 제거';
                    removeBtn.onclick = (function(uid) {
                        return function() { removeSet(uid); };
                    })(muscle + '-' + e);

                    btnDiv.appendChild(addBtn);
                    btnDiv.appendChild(removeBtn);

                    item.appendChild(checkbox);
                    item.appendChild(nameSpan);
                    item.appendChild(setContainer);
                    item.appendChild(btnDiv);

                    group.appendChild(item);
                }

                exerciseList.appendChild(group);
            }

            document.getElementById('workoutModal').classList.add('show');
        }

        function createSetDiv(index, setData, uniqueId) {
            var setDiv = document.createElement('div');
            setDiv.className = 'set-item';

            var title = document.createElement('div');
            title.className = 'set-item-title';
            title.textContent = (index + 1) + '세트';
            setDiv.appendChild(title);

            var inputs = document.createElement('div');
            inputs.className = 'set-inputs';

            var weight = document.createElement('input');
            weight.type = 'number';
            weight.placeholder = '무게(kg)';
            weight.className = 'set-weight';
            weight.setAttribute('data-set', index);
            weight.setAttribute('data-unique-id', uniqueId);
            weight.value = setData[index] ? setData[index].weight : '';

            var reps = document.createElement('input');
            reps.type = 'number';
            reps.placeholder = '회수';
            reps.className = 'set-reps';
            reps.setAttribute('data-set', index);
            reps.setAttribute('data-unique-id', uniqueId);
            reps.value = setData[index] ? setData[index].reps : '';

            inputs.appendChild(weight);
            inputs.appendChild(reps);
            setDiv.appendChild(inputs);

            return setDiv;
        }

        function addSet(uniqueId) {
            var container = document.getElementById('set-container-' + uniqueId);
            var newIdx = setCounters[uniqueId];
            setCounters[uniqueId]++;
            
            var setDiv = createSetDiv(newIdx, [], uniqueId);
            container.appendChild(setDiv);
        }

        function removeSet(uniqueId) {
            if (setCounters[uniqueId] <= 1) {
                alert('최소 1세트');
                return;
            }
            var container = document.getElementById('set-container-' + uniqueId);
            if (container.lastChild) {
                container.removeChild(container.lastChild);
                setCounters[uniqueId]--;
            }
        }

        function saveWorkout() {
            var exList = [];
            var checkboxes = document.querySelectorAll('.exercise-checkbox:checked');

            for (var i = 0; i < checkboxes.length; i++) {
                var cb = checkboxes[i];
                var exName = cb.getAttribute('data-exercise');
                var uniqueId = cb.getAttribute('data-unique-id');
                var setDetails = [];

                for (var s = 0; s < setCounters[uniqueId]; s++) {
                    var wInput = document.querySelector('input.set-weight[data-set="' + s + '"][data-unique-id="' + uniqueId + '"]');
                    var rInput = document.querySelector('input.set-reps[data-set="' + s + '"][data-unique-id="' + uniqueId + '"]');

                    if (wInput && rInput) {
                        var w = wInput.value || '0';
                        var r = rInput.value || '0';
                        if (w !== '0' || r !== '0') {
                            setDetails.push({ weight: w, reps: r });
                        }
                    }
                }

                if (setDetails.length > 0) {
                    exList.push({ name: exName, setDetails: setDetails });
                }
            }

            if (exList.length === 0) {
                alert('운동을 선택하고 정보를 입력해주세요');
                return;
            }

            var dateStr = appState.selectedDate.toLocaleDateString('ko-KR');
            var idx = -1;
            for (var i = 0; i < appState.records.length; i++) {
                if (appState.records[i].date === dateStr) {
                    idx = i;
                    break;
                }
            }

            var record = { date: dateStr, exercises: exList };
            if (idx >= 0) {
                appState.records[idx] = record;
            } else {
                appState.records.push(record);
            }

            localStorage.setItem('workoutRecords', JSON.stringify(appState.records));
            alert('저장되었습니다!');
            closeModal();
            renderCalendar();
        }

        function closeModal() {
            document.getElementById('workoutModal').classList.remove('show');
        }

        function switchTab(idx) {
            var tabs = document.querySelectorAll('.nav-tab');
            for (var i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove('active');
            }
            tabs[idx].classList.add('active');

            document.getElementById('scheduleTab').style.display = 'none';
            document.getElementById('recordsTab').style.display = 'none';

            if (idx === 0) {
                document.getElementById('scheduleTab').style.display = 'block';
            } else {
                document.getElementById('recordsTab').style.display = 'block';
                displayRecords();
            }
        }

        function displayRecords() {
            var list = document.getElementById('recordsList');
            list.innerHTML = '';

            if (appState.records.length === 0) {
                list.innerHTML = '<p>기록 없음</p>';
                return;
            }

            for (var i = 0; i < appState.records.length; i++) {
                var rec = appState.records[i];
                var card = document.createElement('div');
                card.className = 'record-card';

                var h4 = document.createElement('h4');
                h4.textContent = rec.date;
                card.appendChild(h4);

                for (var e = 0; e < rec.exercises.length; e++) {
                    var ex = rec.exercises[e];
                    var p = document.createElement('p');
                    
                    var setInfo = '';
                    if (ex.setDetails) {
                        for (var s = 0; s < ex.setDetails.length; s++) {
                            if (s > 0) setInfo += ' / ';
                            setInfo += (s + 1) + '세트: ' + ex.setDetails[s].weight + 'kg ' + ex.setDetails[s].reps + '회';
                        }
                    }
                    p.textContent = ex.name + ': ' + setInfo;
                    card.appendChild(p);
                }

                list.appendChild(card);
            }
        }

        function resetApp() {
            if (confirm('정말 초기화하시겠습니까?')) {
                localStorage.removeItem('appState');
                document.getElementById('mainPage').style.display = 'none';
                document.getElementById('setupPage').style.display = 'flex';
                document.getElementById('userName').value = '';
                document.getElementById('splitSelect').value = '';
                document.querySelectorAll('input[name="workoutDay"]').forEach(function(el) {
                    el.checked = false;
                });
            }
        }

        window.addEventListener('load', function() {
            var loginData = localStorage.getItem('loginData');
            
            if (loginData) {
                var data = JSON.parse(loginData);
                var now = new Date().getTime();
                
                if (now < data.expiryTime) {
                    showApp();
                } else {
                    localStorage.removeItem('loginData');
                }
            }
        });
    </script>
</body>
</html>
