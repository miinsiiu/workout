<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>운동 기록 사이트</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; color: #333; }
        
        /* 로그인 화면 스타일 */
        .login-page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .login-card {
            background: white;
            padding: 50px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 100%;
        }
        
        .login-card h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .form-group input:focus {
            border-color: #667eea;
            outline: none;
        }
        
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .btn-login:hover {
            background-color: #764ba2;
        }
        
        .error-msg {
            color: #e74c3c;
            margin-top: 10px;
            text-align: center;
            font-size: 14px;
        }
        
        .code-info {
            background: #ecf0f1;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 12px;
            color: #555;
        }
        
        .code-info p {
            margin-bottom: 5px;
        }
        
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* 기존 운동 앱 스타일은 그대로... */
    </style>
</head>
<body>
    <!-- 로그인 화면 -->
    <div id="loginPage" class="login-page">
        <div class="login-card">
            <h1>🏋️ 운동 기록 사이트</h1>
            
            <div class="form-group">
                <label for="accessCode">접근 코드 입력:</label>
                <input type="text" id="accessCode" placeholder="코드를 입력하세요">
            </div>
            
            <button class="btn-login" onclick="checkCode()">접속</button>
            
            <div id="errorMsg" class="error-msg"></div>
            
            <div class="code-info">
                <p><strong>📝 코드 종류:</strong></p>
                <p>🔹 하루 코드: day2024</p>
                <p>🔹 일주일 코드: week2024</p>
                <p>🔹 한달 코드: month2024</p>
            </div>
        </div>
    </div>

    <!-- 운동 앱 (기존 코드) -->
    <div id="appContainer" style="display: none;">
        <!-- 여기에 기존 운동 기입장 전체 코드 삽입 -->
        <!-- ... (기존 HTML 코드) ... -->
    </div>

    <script>
        // 코드별 유효 시간 설정 (밀리초)
        const codeDuration = {
            'day2024': 24 * 60 * 60 * 1000,           // 24시간
            'week2024': 7 * 24 * 60 * 60 * 1000,      // 7일
            'month2024': 30 * 24 * 60 * 60 * 1000     // 30일
        };

        // 로그인 상태 확인 (페이지 로드 시)
        window.addEventListener('load', function() {
            checkLoginStatus();
        });

        // 로그인 상태 확인
        function checkLoginStatus() {
            const loginData = localStorage.getItem('loginData');
            
            if (loginData) {
                const data = JSON.parse(loginData);
                const now = new Date().getTime();
                
                // 유효 시간이 지났는지 확인
                if (now < data.expiryTime) {
                    // 아직 유효함
                    showApp();
                } else {
                    // 만료됨
                    localStorage.removeItem('loginData');
                    showLoginPage();
                }
            } else {
                showLoginPage();
            }
        }

        // 코드 검증
        function checkCode() {
            const code = document.getElementById('accessCode').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            
            if (!code) {
                errorMsg.textContent = '⚠️ 코드를 입력해주세요';
                return;
            }
            
            // 코드가 유효한지 확인
            if (!codeDuration[code]) {
                errorMsg.textContent = '❌ 유효하지 않은 코드입니다';
                return;
            }
            
            // 로그인 데이터 저장
            const now = new Date().getTime();
            const expiryTime = now + codeDuration[code];
            
            const loginData = {
                code: code,
                loginTime: now,
                expiryTime: expiryTime
            };
            
            localStorage.setItem('loginData', JSON.stringify(loginData));
            
            errorMsg.textContent = '';
            showApp();
        }

        // 운동 앱 화면 표시
        function showApp() {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            
            // 만료 시간 표시
            updateExpiryInfo();
            
            // 1분마다 만료 상태 확인
            setInterval(checkExpiry, 60000);
        }

        // 로그인 화면 표시
        function showLoginPage() {
            document.getElementById('loginPage').style.display = 'flex';
            document.getElementById('appContainer').style.display = 'none';
            document.getElementById('accessCode').value = '';
        }

        // 만료 시간까지 남은 시간 표시
        function updateExpiryInfo() {
            const loginData = JSON.parse(localStorage.getItem('loginData'));
            if (!loginData) return;
            
            const now = new Date().getTime();
            const remainingTime = loginData.expiryTime - now;
            
            if (remainingTime > 0) {
                const hours = Math.floor(remainingTime / (1000 * 60 * 60));
                const minutes = Math.floor((remainingTime % (1000 * 60 * 60)) / (1000 * 60));
                
                const infoDiv = document.getElementById('expiryInfo');
                if (infoDiv) {
                    infoDiv.textContent = `⏰ 남은 시간: ${hours}시간 ${minutes}분`;
                }
            }
        }

        // 만료 확인
        function checkExpiry() {
            const loginData = localStorage.getItem('loginData');
            
            if (loginData) {
                const data = JSON.parse(loginData);
                const now = new Date().getTime();
                
                if (now >= data.expiryTime) {
                    alert('⏰ 접근 코드가 만료되었습니다. 다시 로그인해주세요.');
                    localStorage.removeItem('loginData');
                    showLoginPage();
                }
            }
        }

        // 로그아웃 함수
        function logout() {
            if (confirm('로그아웃 하시겠습니까?')) {
                localStorage.removeItem('loginData');
                showLoginPage();
            }
        }
    </script>

    <!-- 여기부터 기존 운동 기입장 코드 시작 -->
    <div id="appContainer">
        <div class="container">
            <!-- 로그아웃 버튼 추가 -->
            <div style="text-align: right; margin-bottom: 20px;">
                <div id="expiryInfo" style="color: #e74c3c; font-weight: bold; margin-bottom: 10px;"></div>
                <button onclick="logout()" style="padding: 8px 16px; background-color: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer;">로그아웃</button>
            </div>
            
            <!-- 기존 운동 기입장 코드 전체 -->
            <!-- 여기에 workout-tracker-final-working.html의 전체 코드 붙여넣기 -->
        </div>
    </div>
</body>
</html>
