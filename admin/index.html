<div id="adminPage" class="admin-page">
    <div class="container">
        <!-- 헤더 -->
        <div class="admin-header">
            <h1>👨‍💼 관리자 페이지</h1>
            <button class="btn btn-logout" onclick="adminLogout()">로그아웃</button>
        </div>

        <!-- 통계 -->
        <div class="stats">
            <div class="stat-card">
                <h3>전체 코드</h3>
                <div class="number" id="totalCodesStat">0</div>
            </div>
            <div class="stat-card">
                <h3>활성 코드</h3>
                <div class="number" id="activeCodesStat">0</div>
            </div>
            <div class="stat-card">
                <h3>비활성 코드</h3>
                <div class="number" id="inactiveCodesStat">0</div>
            </div>
        </div>

        <!-- 코드 생성 -->
        <div class="code-generator">
            <h2>📝 새 코드 생성</h2>
            
            <div class="generator-grid">
                <div class="code-option" onclick="generateCode('day')">
                    <h3>📅 하루</h3>
                    <p>24시간 사용 가능</p>
                    <button class="btn-generate">코드 생성</button>
                </div>
                
                <div class="code-option" onclick="generateCode('week')">
                    <h3>📆 일주일</h3>
                    <p>7일 사용 가능</p>
                    <button class="btn-generate">코드 생성</button>
                </div>
                
                <div class="code-option" onclick="generateCode('month')">
                    <h3>📊 한달</h3>
                    <p>30일 사용 가능</p>
                    <button class="btn-generate">코드 생성</button>
                </div>
            </div>
        </div>

        <!-- 코드 목록 -->
        <div class="code-list">
            <h2>📋 생성된 코드 목록</h2>
            
            <div id="codeTableContainer"></div>
        </div>
    </div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js"></script>

<script>
    // Firebase 설정
    const firebaseConfig = {
        apiKey: "AIzaSyCaiuN-yXBE5cnKFOcBgqcJrZ0lT0Uhe5M",
        authDomain: "admin-6b627.firebaseapp.com",
        databaseURL: "https://admin-6b627-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "admin-6b627",
        storageBucket: "admin-6b627.firebasestorage.app",
        messagingSenderId: "941611834803",
        appId: "1:941611834803:web:0a0a611dbf9e24aef0ffc6",
        measurementId: "G-E92K0R1B21"
    };

    // Firebase 초기화
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    // 관리자 비밀번호
    const ADMIN_PASSWORD = 'admin123';
    
    // 코드 지속 시간
    const codeDuration = {
        'day': 24 * 60 * 60 * 1000,
        'week': 7 * 24 * 60 * 60 * 1000,
        'month': 30 * 24 * 60 * 60 * 1000
    };

    // 페이지 로드 시
    window.addEventListener('load', function() {
        checkAdminLogin();
    });

    // 관리자 로그인 (수정됨)
    function adminLogin() {
        var password = document.getElementById('adminPassword').value;
        var errorMsg = document.getElementById('loginError');
        var successMsg = document.getElementById('loginSuccess');
        
        console.log('입력된 비밀번호:', password);
        console.log('정답:', ADMIN_PASSWORD);
        
        if (!password) {
            errorMsg.textContent = '비밀번호를 입력해주세요';
            successMsg.textContent = '';
            return;
        }
        
        if (password === ADMIN_PASSWORD) {
            console.log('로그인 성공!');
            localStorage.setItem('adminLogged', 'true');
            successMsg.textContent = '✅ 로그인 중...';
            errorMsg.textContent = '';
            
            setTimeout(function() {
                showAdminPage();
            }, 500);
        } else {
            console.log('로그인 실패: 비밀번호 불일치');
            errorMsg.textContent = '❌ 비밀번호가 틀렸습니다';
            successMsg.textContent = '';
            document.getElementById('adminPassword').value = '';
        }
    }

    // 관리자 로그인 상태 확인
    function checkAdminLogin() {
        var isLogged = localStorage.getItem('adminLogged');
        console.log('관리자 로그인 상태:', isLogged);
        
        if (isLogged === 'true') {
            showAdminPage();
        } else {
            showLoginPage();
        }
    }

    // 관리자 페이지 표시
    function showAdminPage() {
        console.log('관리자 페이지 표시');
        document.getElementById('adminLogin').style.display = 'none';
        document.getElementById('adminPage').style.display = 'block';
        updateStats();
        renderCodeTable();
    }

    // 로그인 페이지 표시
    function showLoginPage() {
        console.log('로그인 페이지 표시');
        document.getElementById('adminLogin').style.display = 'flex';
        document.getElementById('adminPage').style.display = 'none';
    }

    // 관리자 로그아웃
    function adminLogout() {
        if (confirm('로그아웃 하시겠습니까?')) {
            localStorage.removeItem('adminLogged');
            document.getElementById('adminPassword').value = '';
            showLoginPage();
        }
    }

    // 코드 생성
    function generateCode(type) {
        var randomCode = 'CODE' + Math.random().toString(36).substring(2, 10).toUpperCase();
        
        var now = new Date().getTime();
        var expiryTime = now + codeDuration[type];
        
        var codeData = {
            code: randomCode,
            type: type,
            createdAt: now,
            expiryTime: expiryTime,
            active: true,
            usedBy: [],
            usageCount: 0
        };
        
        // Firebase에 저장
        database.ref('codes').child(randomCode).set(codeData, function(error) {
            if (error) {
                alert('❌ 코드 생성 실패');
                console.error('Firebase 에러:', error);
            } else {
                alert('✅ 코드 생성됨!\n\n코드: ' + randomCode + '\n종류: ' + (type === 'day' ? '하루' : type === 'week' ? '일주일' : '한달'));
                updateStats();
                renderCodeTable();
            }
        });
    }

    // 코드 삭제
    function deleteCode(codeValue) {
        if (confirm('이 코드를 삭제하시겠습니까?')) {
            database.ref('codes').child(codeValue).remove(function(error) {
                if (error) {
                    alert('❌ 삭제 실패');
                } else {
                    updateStats();
                    renderCodeTable();
                }
            });
        }
    }

    // 코드 활성/비활성 토글
    function toggleCodeStatus(codeValue, isActive) {
        database.ref('codes').child(codeValue).update({
            active: !isActive
        }, function(error) {
            if (error) {
                alert('❌ 업데이트 실패');
            } else {
                updateStats();
                renderCodeTable();
            }
        });
    }

    // 코드 테이블 렌더링
    function renderCodeTable() {
        database.ref('codes').once('value', function(snapshot) {
            var codes = [];
            
            if (snapshot.exists()) {
                snapshot.forEach(function(childSnapshot) {
                    codes.push(childSnapshot.val());
                });
            }
            
            var container = document.getElementById('codeTableContainer');
            
            if (codes.length === 0) {
                container.innerHTML = '<div class="empty-message">생성된 코드가 없습니다</div>';
                return;
            }
            
            var html = '<table class="code-table"><thead><tr>';
            html += '<th>코드</th><th>종류</th><th>상태</th><th>생성일시</th><th>만료일시</th><th>사용자</th><th>작업</th>';
            html += '</tr></thead><tbody>';
            
            codes.forEach(function(codeData) {
                var typeText = codeData.type === 'day' ? '하루' : codeData.type === 'week' ? '일주일' : '한달';
                var typeBadgeClass = 'badge-' + codeData.type;
                var statusBadgeClass = codeData.active ? 'badge-active' : 'badge-inactive';
                var statusText = codeData.active ? '활성' : '비활성';
                var statusButtonClass = codeData.active ? 'btn-toggle-active' : 'btn-toggle-inactive';
                var statusButtonText = codeData.active ? '비활성' : '활성';
                
                var createdDate = new Date(codeData.createdAt).toLocaleString('ko-KR');
                var expiryDate = new Date(codeData.expiryTime).toLocaleString('ko-KR');
                
                var usageText = codeData.usageCount > 0 ? codeData.usageCount + '명' : '미사용';
                
                html += '<tr>';
                html += '<td><strong>' + codeData.code + '</strong></td>';
                html += '<td><span class="code-badge ' + typeBadgeClass + '">' + typeText + '</span></td>';
                html += '<td><span class="code-badge ' + statusBadgeClass + '">' + statusText + '</span></td>';
                html += '<td>' + createdDate + '</td>';
                html += '<td>' + expiryDate + '</td>';
                html += '<td>' + usageText + '</td>';
                html += '<td>';
                html += '<button class="btn-toggle ' + statusButtonClass + '" onclick="toggleCodeStatus(\'' + codeData.code + '\', ' + codeData.active + ')">' + statusButtonText + '</button>';
                html += '<button class="btn-delete" onclick="deleteCode(\'' + codeData.code + '\')">삭제</button>';
                html += '</td>';
                html += '</tr>';
            });
            
            html += '</tbody></table>';
            
            container.innerHTML = html;
        });
    }

    // 통계 업데이트
    function updateStats() {
        database.ref('codes').once('value', function(snapshot) {
            var totalCodes = 0;
            var activeCodes = 0;
            
            if (snapshot.exists()) {
                snapshot.forEach(function(childSnapshot) {
                    totalCodes++;
                    if (childSnapshot.val().active) {
                        activeCodes++;
                    }
                });
            }
            
            var inactiveCodes = totalCodes - activeCodes;
            
            document.getElementById('totalCodesStat').textContent = totalCodes;
            document.getElementById('activeCodesStat').textContent = activeCodes;
            document.getElementById('inactiveCodesStat').textContent = inactiveCodes;
        });
    }
</script>
